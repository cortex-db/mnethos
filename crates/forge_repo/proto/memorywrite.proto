syntax = "proto3";

package ai_working_memory.memorywrite.v1;

option go_package = "primitive-activation-graph/ai-working-memory/proto/memorywrite;memorywritepb";

service MemoryWrite {
  rpc CreateEpisode(CreateEpisodeRequest) returns (CreateEpisodeResponse);
}

message Anchor {
  string text = 1;
  string role = 2;
  float strength = 3;
}

message Concept {
  string text = 1;
  float confidence = 2;
  repeated Anchor anchors = 3;
}

message Episode {
  string text = 1;
  repeated Concept concepts = 2;
}

message CreateEpisodeRequest {
  string session_key = 1;
  Episode episode = 2;
}

message CreateEpisodeResponse {
  string episode_id = 1;
  int32 concept_count = 2;
  int32 anchor_count = 3;
  int32 unique_refs = 4;
  int32 custom_l0_count = 5;
  int32 reused_concepts = 6;
}
